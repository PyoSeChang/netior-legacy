verify:
  - name: "network structure separates character world plot and story spaces"
    db:
      table: networks
      condition: "project_id = '{{project_id}}' AND LOWER(name) IN ('character', 'characters', 'worldbuilding', 'world', 'plot', 'story', '캐릭터', '인물', '세계관', '설정', '플롯', '줄거리', '스토리', '장면')"
      expect:
        count_min: 4

  - name: "core fantasy schemas exist"
    db:
      table: schemas
      expect:
        count_min: 7
        column_includes:
          name: ["Character", "Faction", "Region", "City", "Quest", "Event", "Scene"]

  - name: "Quest uses workflow models"
    db:
      table: schemas
      condition: "project_id = '{{project_id}}' AND name = 'Quest' AND models LIKE '%statusful%' AND models LIKE '%prioritizable%'"
      expect:
        count: 1

  - name: "Scene uses temporal model"
    db:
      table: schemas
      condition: "project_id = '{{project_id}}' AND name = 'Scene' AND models LIKE '%temporal%'"
      expect:
        count: 1

  - name: "Character.faction is a Faction schema_ref"
    db:
      table: schema_fields
      condition: "name = 'faction' AND field_type = 'schema_ref' AND schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Character') AND ref_schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Faction')"
      expect:
        count: 1

  - name: "Quest.giver is a Character schema_ref"
    db:
      table: schema_fields
      condition: "name = 'giver' AND field_type = 'schema_ref' AND schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Quest') AND ref_schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Character')"
      expect:
        count: 1

  - name: "Quest.target_region is a Region schema_ref"
    db:
      table: schema_fields
      condition: "name = 'target_region' AND field_type = 'schema_ref' AND schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Quest') AND ref_schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Region')"
      expect:
        count: 1

  - name: "Scene.pov_character is a Character schema_ref"
    db:
      table: schema_fields
      condition: "name = 'pov_character' AND field_type = 'schema_ref' AND schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Scene') AND ref_schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Character')"
      expect:
        count: 1

  - name: "starter instances were created"
    db:
      table: instances
      expect:
        count_min: 4

  - name: "starter instance nodes were created"
    db:
      table: network_nodes
      condition: "network_id IN (SELECT id FROM networks WHERE project_id = '{{project_id}}') AND object_id IN (SELECT id FROM objects WHERE project_id = '{{project_id}}' AND object_type = 'instance')"
      expect:
        count_min: 4

  - name: "no response error"
    response:
      no_error: true

  - name: "bootstrap asks two domain interview rounds"
    tool:
      name: ask
      expect:
        count_min: 2
        count_max: 4

  - name: "bootstrap presents at least one proposal"
    tool:
      name: propose
      expect:
        count_min: 1
        count_max: 4
        sequence: [ask, ask, propose, create_schema]

  - name: "network creation tool usage is bounded"
    tool:
      name: create_network
      expect:
        count_min: 4
        count_max: 20

  - name: "schema creation tool usage is bounded"
    tool:
      name: create_schema
      expect:
        count_min: 7
        count_max: 20

  - name: "field creation tool usage is bounded"
    tool:
      name: create_schema_field
      expect:
        count_min: 4
        count_max: 30

  - name: "starter instance creation tool usage is bounded"
    tool:
      name: create_instance
      expect:
        count_min: 4
        count_max: 24

  - name: "starter node creation tool usage is bounded"
    tool:
      name: create_network_node
      expect:
        count_min: 4
        count_max: 24

  - name: "analysis: project binding violation absent"
    analysis:
      tool_use:
        findings_absent: [bootstrap_missing_interview, bootstrap_insufficient_interview, bootstrap_missing_proposal, project_binding_violation]
        summary:
          project_binding_violation_count:
            count: 0
