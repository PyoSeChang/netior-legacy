verify:
  - name: "interactive view template is created for the target schema"
    db:
      table: interactive_view_templates
      condition: "project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question') AND source_kind = 'narre'"
      expect:
        count: 1
        not_null: [source_code, manifest_json]

  - name: "template uses the Interactive SDK and exports a view"
    db:
      table: interactive_view_templates
      condition: "project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question') AND source_code LIKE '%@netior/interactive-sdk%' AND (source_code LIKE '%export function View%' OR source_code LIKE '%export const View%' OR source_code LIKE '%export default%' OR source_code LIKE '%export function InteractiveView%' OR source_code LIKE '%export const InteractiveView%')"
      expect:
        count: 1

  - name: "template reads exam fields without real field writes"
    db:
      table: interactive_view_templates
      condition: "project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question') AND manifest_json LIKE '%interactive-view%' AND manifest_json LIKE '%sdkVersion%' AND manifest_json LIKE '%viewState%' AND manifest_json LIKE '%writeFields%'"
      expect:
        count: 1

  - name: "template passes the runtime Interactive View contract"
    interactive_view_contract:
      condition: "project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question')"
      expect:
        count: 1

  - name: "template contains choice checking behavior"
    db:
      table: interactive_view_templates
      condition: "project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question') AND source_code LIKE '%choices%' AND source_code LIKE '%answer%' AND source_code LIKE '%explanation%' AND source_code LIKE '%useViewState%'"
      expect:
        count: 1

  - name: "interactive view schema preference is selected for the target schema"
    db:
      table: interactive_view_schema_preferences
      condition: "schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question') AND selected_view_template_id IN (SELECT id FROM interactive_view_templates WHERE project_id = '{{project_id}}' AND target_kind = 'schema' AND target_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question'))"
      expect:
        count: 1

  - name: "target instance has no interactive view override"
    db:
      table: interactive_view_preferences
      condition: "instance_id IN (SELECT id FROM instances WHERE project_id = '{{project_id}}' AND title = 'Photosynthesis Multiple Choice')"
      expect:
        count: 0

  - name: "additional exam question instances are available for manual view checks"
    db:
      table: instances
      condition: "project_id = '{{project_id}}' AND schema_id IN (SELECT id FROM schemas WHERE project_id = '{{project_id}}' AND name = 'Exam Question')"
      expect:
        count_min: 3

  - name: "no response error"
    response:
      no_error: true

  - name: "template creation tool called once"
    tool:
      name: create_interactive_view_template
      expect:
        count_min: 1
        count_max: 1

  - name: "interactive view dry run happens before creation"
    tool:
      name: dry_run_interactive_view_template
      expect:
        count_min: 1
        count_max: 3
      sequence:
        - dry_run_interactive_view_template
        - create_interactive_view_template

  - name: "schema preference tool called once"
    tool:
      name: set_interactive_view_schema_preference
      expect:
        count_min: 1
        count_max: 1

  - name: "instance preference tool is not called"
    tool:
      name: set_interactive_view_preference
      expect:
        count_min: 0
        count_max: 0

  - name: "additional instance creation is bounded"
    tool:
      name: create_instance
      expect:
        count_min: 2
        count_max: 2
